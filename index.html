<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner V9.1</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#040515;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:38px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:16px;
    border-radius:14px;
    margin-bottom:12px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:22px;
    font-weight:bold;
}

.rank{
    float:right;
    background:#10b981;
    padding:5px 9px;
    border-radius:999px;
    font-size:12px;
}

.signal{
    margin-top:10px;
    font-size:17px;
}

.zone{
    margin-top:8px;
    color:#93c5fd;
    font-size:13px;
}

.ai{
    margin-top:8px;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    color:#38bdf8;
    font-size:12px;
}

.conf{
    margin-top:6px;
    color:#facc15;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI Scanner V9.1</div>
<div class="sub">Stable Version - Always Shows Market Flow</div>
<div class="live">🟢 LIVE FUTURES SCANNER</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
const data = await res.json();

let html = '';

const all = data
.filter(c => c.symbol.endsWith('USDT'))
.map(c => {

const price = parseFloat(c.lastPrice);
const high = parseFloat(c.highPrice);
const low = parseFloat(c.lowPrice);

const volume = parseFloat(c.quoteVolume);
const change = parseFloat(c.priceChangePercent);
const count = parseFloat(c.count);

/* =========================
   TREND
========================= */
let tf = "NEUTRAL";

if(change > 3) tf = "BULLISH";
if(change < -3) tf = "BEARISH";

/* =========================
   CORE SCORE
========================= */
let structure = 0;

if(volume > 200000000) structure += 25;
if(change > 1 && change < 5) structure += 20;
if(count > 120000) structure += 10;

/* =========================
   ZONE
========================= */
const range = high - low;

const demand = low + range * 0.2;
const supply = high - range * 0.2;

let zone = "MID";

if(price <= demand) zone = "DEMAND";
if(price >= supply) zone = "SUPPLY";

/* =========================
   BREAKOUT / SWEEP
========================= */
let breakout = price > high * 0.995 && volume > 200000000;
let sweep = price < low * 1.02 && change < 0;

/* =========================
   RISK
========================= */
let risk = 0;

if(change > 8 || change < -8) risk += 30;
if(volume < 80000000) risk += 20;
if(tf === "BEARISH" && change > 3) risk += 25;
if(zone === "SUPPLY" && change > 0) risk += 15;

/* =========================
   PROBABILITY
========================= */
let probability = 0;

probability += structure * 3;
if(breakout) probability += 120;
if(sweep) probability += 80;
if(tf === "BULLISH") probability += 80;
if(zone === "DEMAND") probability += 80;

probability -= risk * 2;

/* =========================
   CATEGORY SYSTEM (FIX)
========================= */
let category = "👀 WATCH";
let signal = "NO TRADE";
let conf = "LOW";
let analysis = "Market normal / no edge";

if(probability > 750 && breakout && tf === "BULLISH"){
    category = "🚀 TRADE";
    signal = "INSTITUTIONAL BREAKOUT";
    conf = "VERY HIGH";
    analysis = "Strong breakout + trend alignment";
}

else if(probability > 650){
    category = "👀 WATCH";
    signal = "EARLY SETUP";
    conf = "MEDIUM";
    analysis = "Setup forming but not confirmed";
}

else{
    category = "⚠️ AVOID";
    signal = "NO EDGE";
    conf = "LOW";
    analysis = "Market noisy / no setup";
}

/* =========================
   OUTPUT
========================= */
return {
symbol:c.symbol,
price:price,
change:change,
volume:volume,
tf:tf,
zone:zone,
breakout:breakout,
sweep:sweep,
risk:risk,
probability:probability,
category:category,
signal:signal,
analysis:analysis,
conf:conf
};

})
.sort((a,b) => b.probability - a.probability)
.slice(0,10);

/* fallback anti empty */
if(all.length === 0){
    all.push({
        symbol:"NO DATA",
        price:0,
        change:0,
        volume:0,
        tf:"N/A",
        zone:"N/A",
        breakout:false,
        sweep:false,
        risk:0,
        probability:0,
        category:"⚠️ AVOID",
        signal:"NO DATA",
        analysis:"Fallback mode active",
        conf:"LOW"
    });
}

all.forEach(c => {

const vol = (c.volume/1000000).toFixed(0);

html += `
<div class="card">

<div class="coin">
${c.symbol}
<span class="rank">${c.probability}/1000</span>
</div>

<div class="signal">
${c.category} - ${c.signal}
</div>

<div class="zone">
📊 TF: ${c.tf}<br>
📍 Zone: ${c.zone}<br>
📈 Change: ${c.change.toFixed(2)}% | Volume: $${vol}M<br>
⚠️ Risk: ${c.risk}
</div>

<div class="ai">
🧠 ${c.analysis}

<div class="conf">
⭐ Confidence: ${c.conf}
</div>

</div>

</div>
`;
});

document.getElementById('market').innerHTML = html;

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
