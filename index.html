<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA200 Daily Touch Scanner</title>

<style>
body{
  background:#050816;
  color:white;
  font-family:Arial;
  padding:20px;
}

h1{
  text-align:center;
}

#status{
  text-align:center;
  color:#38bdf8;
  margin-bottom:20px;
}

.card{
  background:#111827;
  border-left:5px solid #22c55e;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.symbol{
  font-size:20px;
  font-weight:bold;
}

.touch{
  color:#22c55e;
  font-weight:bold;
}

.small{
  color:#cbd5e1;
  margin-top:8px;
}
</style>
</head>
<body>

<h1>🔥 MA200 Daily Touch Scanner</h1>

<div id="status">Loading...</div>

<div id="results"></div>

<script>

const BASE = "https://fapi.binance.com";

function SMA(data, period){

 let sum = 0;

 for(let i=data.length-period;i<data.length;i++){
   sum += data[i];
 }

 return sum / period;
}

async function getTop100(){

 const res =
 await fetch(
  BASE + "/fapi/v1/ticker/24hr"
 );

 const data =
 await res.json();

 return data
 .filter(
  x=>x.symbol.endsWith("USDT")
 )
 .sort(
  (a,b)=>
  Number(b.quoteVolume) -
  Number(a.quoteVolume)
 )
 .slice(0,100);
}

async function getKlines(symbol){

 const res =
 await fetch(
 `${BASE}/fapi/v1/klines?symbol=${symbol}&interval=1d&limit=200`
 );

 return await res.json();
}

async function scan(){

 const status =
 document.getElementById("status");

 const results =
 document.getElementById("results");

 results.innerHTML = "";

 const pairs =
 await getTop100();

 const found = [];

 let count = 0;

 for(const pair of pairs){

  count++;

  status.innerHTML =
  `Scanning ${count}/100 : ${pair.symbol}`;

  try{

   const klines =
   await getKlines(pair.symbol);

   if(
    !Array.isArray(klines)
    ||
    klines.length < 200
   ){
    continue;
   }

   const closes =
   klines.map(
    x=>Number(x[4])
   );

   const ma200 =
   SMA(closes,200);

   const price =
   closes[closes.length-1];

   const distance =
   Math.abs(
    price-ma200
   ) / ma200 * 100;

   // MENYENTUH MA200 DAILY
   if(distance <= 0.5){

    found.push({

     symbol:pair.symbol,
     price,
     ma200,
     distance

    });
   }

  }catch(err){

   console.log(err);

  }

 }

 found.sort(
 (a,b)=>
 a.distance -
 b.distance
 );

 let html = "";

 found.forEach(c=>{

 html += `
 <div class="card">

  <div class="symbol">
   ${c.symbol}
  </div>

  <div class="touch">
   🔥 MENYENTUH MA200 DAILY
  </div>

  <div class="small">

   Distance:
   ${c.distance.toFixed(2)}%

   <br><br>

   Price:
   ${c.price.toFixed(6)}

   <br>

   MA200:
   ${c.ma200.toFixed(6)}

  </div>

 </div>
 `;
 });

 if(found.length===0){

 html =
 `
 <div class="card">
 Tidak ada coin yang sedang menyentuh MA200 Daily (≤ 0.5%).
 </div>
 `;
 }

 results.innerHTML = html;

 status.innerHTML =
 `Update ${new Date().toLocaleTimeString()}
 | ${found.length} coin`;

}

scan();

setInterval(
 scan,
 300000
);

</script>

</body>
</html>
