<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Daily MA200 Scanner</title>

<style>
body{
 background:#050816;
 color:white;
 font-family:Arial,sans-serif;
 padding:20px;
 margin:0;
}

h1{
 text-align:center;
}

#status{
 text-align:center;
 color:#38bdf8;
 margin-bottom:20px;
}

.card{
 background:#111827;
 border-radius:12px;
 padding:15px;
 margin-bottom:10px;
 border-left:5px solid #22c55e;
}

.symbol{
 font-size:20px;
 font-weight:bold;
 margin-bottom:8px;
}

.green{
 color:#22c55e;
 font-weight:bold;
}

.small{
 color:#cbd5e1;
 margin-top:8px;
 font-size:14px;
}
</style>
</head>
<body>

<h1>📈 Binance Daily MA200 Scanner</h1>

<div id="status">
Loading...
</div>

<div id="results"></div>

<script>

const BASE =
"https://fapi.binance.com";

function SMA(data, period){

 let sum = 0;

 for(
   let i=data.length-period;
   i<data.length;
   i++
 ){
   sum += data[i];
 }

 return sum / period;
}

async function getTopPairs(){

 const res =
 await fetch(
 BASE +
 "/fapi/v1/ticker/24hr"
 );

 const data =
 await res.json();

 return data
 .filter(
 x=>x.symbol.endsWith("USDT")
 )
 .sort(
 (a,b)=>
 Number(b.quoteVolume)
 -
 Number(a.quoteVolume)
 )
 .slice(0,30);

}

async function getKlines(symbol){

 const res =
 await fetch(
 `${BASE}/fapi/v1/klines?symbol=${symbol}&interval=1d&limit=200`
 );

 return await res.json();
}

async function scan(){

 const status =
 document.getElementById(
 "status"
 );

 const resultsDiv =
 document.getElementById(
 "results"
 );

 status.innerHTML =
 "Scanning Binance...";

 resultsDiv.innerHTML="";

 try{

 const pairs =
 await getTopPairs();

 const results=[];

 let count=0;

 for(const pair of pairs){

  count++;

  status.innerHTML =
  `Scanning ${count}/${pairs.length}
   ${pair.symbol}`;

  try{

   const klines =
   await getKlines(
   pair.symbol
   );

   if(
   !Array.isArray(klines)
   ||
   klines.length < 200
   ){
    continue;
   }

   const closes =
   klines.map(
   x=>Number(x[4])
   );

   const ma200 =
   SMA(
   closes,
   200
   );

   const price =
   closes[
   closes.length-1
   ];

   const distance =
   Math.abs(
   price-ma200
   ) /
   ma200 *
   100;

   if(
   price > ma200
   ){

    results.push({

     symbol:
     pair.symbol,

     price,

     ma200,

     distance

    });

   }

  }catch(err){

   console.log(
   pair.symbol,
   err
   );

  }
 }

 results.sort(
 (a,b)=>
 a.distance-
 b.distance
 );

 let html="";

 results.forEach(c=>{

 html += `

 <div class="card">

  <div class="symbol">
  ${c.symbol}
  </div>

  <div class="green">
  ✅ Di Atas MA200 Daily
  </div>

  <div class="small">

  Distance:
  ${c.distance.toFixed(2)}%

  <br><br>

  Price:
  ${c.price.toFixed(6)}

  <br>

  MA200 Daily:
  ${c.ma200.toFixed(6)}

  </div>

 </div>

 `;
 });

 if(results.length===0){

 html =
 `
 <div class="card">
 Tidak ada coin yang berada di atas MA200 Daily.
 </div>
 `;
 }

 resultsDiv.innerHTML =
 html;

 status.innerHTML =
 `Update:
 ${new Date().toLocaleTimeString()}
 | ${results.length}
 coin ditemukan`;

 }catch(err){

 status.innerHTML =
 "Error mengambil data Binance";

 console.log(err);

 }

}

scan();

setInterval(
scan,
300000
);

</script>

</body>
</html>
