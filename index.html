<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Whale Tracker</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#081120;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:42px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:28px;
    font-weight:bold;
}

.signal{
    margin-top:10px;
    font-size:18px;
    color:#22c55e;
}

.stats{
    margin-top:15px;
    line-height:1.8;
    color:#cbd5e1;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:20px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
🐋 Realtime Whale Tracker
</div>

<div class="sub">
Live Binance Futures Scanner
</div>

<div class="live">
🟢 LIVE DATA
</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const response =
await fetch(
'https://fapi.binance.com/fapi/v1/ticker/24hr'
);

const data =
await response.json();

const top =
data
.filter(c =>
c.symbol.endsWith('USDT')
)
.sort((a,b) =>
parseFloat(b.quoteVolume) -
parseFloat(a.quoteVolume)
)
.slice(0,10);

let html = '';

top.forEach(c => {

const volume =
(parseFloat(c.quoteVolume)/1000000)
.toFixed(0);

const change =
parseFloat(c.priceChangePercent)
.toFixed(2);

let signal = '⚠️ WATCH';

if(change > 8)
signal = '🚀 STRONG BUY';

else if(change > 3)
signal = '🔥 BULLISH';

else if(change < -5)
signal = '❌ BEARISH';

html += `

<div class="card">

<div class="coin">
${c.symbol}
</div>

<div class="signal">
${signal}
</div>

<div class="stats">

📈 24H Change: ${change}%<br>

💰 Volume: $${volume}M

</div>

</div>

`;

});

document.getElementById('market')
.innerHTML = html;

}

loadData();

setInterval(loadData, 10000);

</script>

</body>
</html>
