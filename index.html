<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fresh Touch MA200 Daily Scanner</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
    margin:0;
}

h1{
    text-align:center;
}

#status{
    text-align:center;
    margin-bottom:20px;
    color:#94a3b8;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    border-left:5px solid #22c55e;
}

.symbol{
    font-size:20px;
    font-weight:bold;
}

.touch{
    color:#22c55e;
    font-weight:bold;
    margin-top:8px;
}

.small{
    color:#cbd5e1;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🔥 Fresh Touch MA200 Daily</h1>

<div id="status">
Loading...
</div>

<div id="results"></div>

<script>

function sma(arr, period){

    if(arr.length < period) return null;

    let sum = 0;

    for(let i=arr.length-period;i<arr.length;i++){
        sum += arr[i];
    }

    return sum / period;
}

async function getPairs(){

    const res = await fetch(
    "https://api.binance.com/api/v3/ticker/24hr"
    );

    const data = await res.json();

    return data
    .filter(
        x =>
        x.symbol.endsWith("USDT")
    )
    .sort(
        (a,b)=>
        Number(b.quoteVolume) -
        Number(a.quoteVolume)
    )
    .slice(0,100);

}

async function scan(){

    const status =
    document.getElementById("status");

    const resultsDiv =
    document.getElementById("results");

    status.innerHTML =
    "Scanning Binance...";

    resultsDiv.innerHTML = "";

    try{

        const pairs =
        await getPairs();

        const results = [];

        let count = 0;

        for(const pair of pairs){

            count++;

            status.innerHTML =
            `Scanning ${count}/${pairs.length} ${pair.symbol}`;

            try{

                const response =
                await fetch(
                `https://api.binance.com/api/v3/klines?symbol=${pair.symbol}&interval=1d&limit=250`
                );

                const klines =
                await response.json();

                if(
                    !Array.isArray(klines) ||
                    klines.length < 200
                ){
                    continue;
                }

                const closes =
                klines.map(
                    k => Number(k[4])
                );

                const ma200Today =
                sma(closes,200);

                const prevCloses =
                closes.slice(
                    0,
                    closes.length-1
                );

                const ma200Prev =
                sma(
                    prevCloses,
                    200
                );

                const last =
                klines[
                klines.length-1
                ];

                const prev =
                klines[
                klines.length-2
                ];

                const lowToday =
                Number(last[3]);

                const highToday =
                Number(last[2]);

                const lowPrev =
                Number(prev[3]);

                const highPrev =
                Number(prev[2]);

                const touchToday =
                lowToday <= ma200Today &&
                highToday >= ma200Today;

                const touchPrev =
                lowPrev <= ma200Prev &&
                highPrev >= ma200Prev;

                if(
                    touchToday &&
                    !touchPrev
                ){

                    results.push({

                        symbol:
                        pair.symbol,

                        close:
                        Number(last[4]),

                        ma200:
                        ma200Today,

                        volume:
                        Number(
                        pair.quoteVolume
                        )

                    });

                }

            }catch(e){}

        }

        results.sort(
            (a,b)=>
            b.volume - a.volume
        );

        let html = "";

        if(results.length===0){

            html =
            `
            <div class="card">
            Tidak ada coin yang baru menyentuh MA200 Daily.
            </div>
            `;

        }else{

            results.forEach(
            (c,index)=>{

                html +=
                `
                <div class="card">

                    <div class="symbol">
                    #${index+1}
                    ${c.symbol}
                    </div>

                    <div class="touch">
                    🔥 Fresh Touch MA200 Daily
                    </div>

                    <div class="small">

                    Close:
                    ${c.close.toFixed(6)}

                    <br><br>

                    MA200:
                    ${c.ma200.toFixed(6)}

                    </div>

                </div>
                `;
            });

        }

        resultsDiv.innerHTML =
        html;

        status.innerHTML =
        `Update ${new Date().toLocaleTimeString()} | ${results.length} Coin`;

    }catch(err){

        status.innerHTML =
        "Error mengambil data Binance";

        console.log(err);

    }

}

scan();

setInterval(
    scan,
    300000
);

</script>

</body>
</html>
