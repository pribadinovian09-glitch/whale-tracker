<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner V8</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#040515;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:38px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:18px;
    border-radius:14px;
    margin-bottom:12px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:22px;
    font-weight:bold;
}

.rank{
    float:right;
    background:#10b981;
    padding:5px 9px;
    border-radius:999px;
    font-size:12px;
}

.signal{
    margin-top:10px;
    font-size:18px;
}

.zone{
    margin-top:8px;
    color:#93c5fd;
    font-size:13px;
}

.ai{
    margin-top:8px;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    color:#38bdf8;
    font-size:12px;
}

.conf{
    margin-top:6px;
    color:#facc15;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI Scanner V8</div>
<div class="sub">High Accuracy Confluence Engine (Strict Mode)</div>
<div class="live">🟢 LIVE FUTURES FILTER</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
const data = await res.json();

let html = '';

const filtered = data
.filter(c => c.symbol.endsWith('USDT'))
.map(c => {

const price = parseFloat(c.lastPrice);
const high = parseFloat(c.highPrice);
const low = parseFloat(c.lowPrice);

const volume = parseFloat(c.quoteVolume);
const change = parseFloat(c.priceChangePercent);
const count = parseFloat(c.count);

/* =========================
   TREND FILTER
========================= */
let trend = "NEUTRAL";

if(change > 3) trend = "UP";
if(change < -3) trend = "DOWN";

/* =========================
   BASIC FILTERS
========================= */
let volumeOK = volume > 200000000;
let strongVolume = volume > 400000000;

/* =========================
   BREAKOUT LOGIC
========================= */
let breakout = price > high * 0.995 && volumeOK;

/* =========================
   LIQUIDITY SWEEP
========================= */
let sweep = (price < low * 1.02 && change < 0);

/* =========================
   OVEREXTENSION FILTER
========================= */
let extended = (change > 8 || change < -8);

/* =========================
   CONFLUENCE SCORE (STRICT)
========================= */
let confluence = 0;

if(trend === "UP") confluence += 30;
if(volumeOK) confluence += 25;
if(strongVolume) confluence += 10;
if(breakout) confluence += 30;
if(sweep) confluence += 10;
if(change > 1 && change < 5) confluence += 10;

/* penalty */
if(extended) confluence -= 15;

/* =========================
   SIGNAL ENGINE (STRICT MODE)
========================= */
let signal = "⚠️ NO TRADE";
let analysis = "No high probability setup";
let conf = "LOW";

if(confluence >= 85 && breakout && trend === "UP"){
    signal = "🚀 STRONG BREAKOUT SETUP";
    analysis = "All conditions aligned (trend + breakout + volume)";
    conf = "VERY HIGH";
}

else if(confluence >= 85 && sweep && trend === "UP"){
    signal = "🔥 SMART MONEY ACCUMULATION";
    analysis = "Liquidity sweep + bullish structure";
    conf = "HIGH";
}

/* =========================
   OUTPUT
========================= */
return {
symbol:c.symbol,
price:price,
change:change,
volume:volume,
count:count,
trend:trend,
breakout:breakout,
sweep:sweep,
confluence:confluence,
signal:signal,
analysis:analysis,
conf:conf
};

})
.filter(c => c.confluence >= 75) // STRICT FILTER
.sort((a,b) => b.confluence - a.confluence)
.slice(0,8);

filtered.forEach(c => {

const vol = (c.volume/1000000).toFixed(0);

html += `
<div class="card">

<div class="coin">
${c.symbol}
<span class="rank">${c.confluence}/100</span>
</div>

<div class="signal">
${c.signal}
</div>

<div class="zone">
📊 Trend: ${c.trend}<br>
📈 Change: ${c.change.toFixed(2)}%<br>
💰 Volume: $${vol}M<br>
🚀 Breakout: ${c.breakout ? "YES" : "NO"} | Sweep: ${c.sweep ? "YES" : "NO"}
</div>

<div class="ai">
🧠 ${c.analysis}

<div class="conf">
⭐ Confidence: ${c.conf}
</div>

</div>

</div>
`;
});

document.getElementById('market').innerHTML = html;

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
