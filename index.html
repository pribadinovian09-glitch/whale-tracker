<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#081120;
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:46px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
    font-size:18px;
}

.card{
    background:#111827;
    padding:22px;
    border-radius:20px;
    margin-bottom:22px;
    border-left:7px solid #10b981;
}

.coin{
    font-size:32px;
    font-weight:bold;
}

.signal{
    margin-top:12px;
    font-size:20px;
    color:#22c55e;
}

.stats{
    margin-top:16px;
    line-height:2;
    color:#cbd5e1;
    font-size:18px;
}

.rank{
    float:right;
    background:#10b981;
    padding:8px 14px;
    border-radius:999px;
    font-size:14px;
}

.ai{
    margin-top:12px;
    background:#0f172a;
    padding:14px;
    border-radius:14px;
    color:#38bdf8;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
🧠 Smart Money AI Scanner
</div>

<div class="sub">
Realtime Binance Futures Smart Flow Detector
</div>

<div class="live">
🟢 LIVE AI MARKET SCAN
</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const response =
await fetch(
'https://fapi.binance.com/fapi/v1/ticker/24hr'
);

const data =
await response.json();

const filtered =
data
.filter(c =>
c.symbol.endsWith('USDT')
)

.map(c => {

const volume =
parseFloat(c.quoteVolume);

const change =
parseFloat(c.priceChangePercent);

const count =
parseFloat(c.count);

let ai = 0;

if(volume > 100000000)
ai += 35;

if(change > 1 && change < 6)
ai += 30;

if(count > 120000)
ai += 20;

if(change < 12)
ai += 15;

let signal =
'👀 WATCH';

let analysis =
'Market mulai aktif';

if(ai > 90){

signal =
'🚀 STRONG SMART MONEY';

analysis =
'Whale flow kuat + futures activity tinggi';

}

else if(ai > 75){

signal =
'🔥 EARLY ACCUMULATION';

analysis =
'Kemungkinan smart money mulai masuk';

}

else if(ai > 60){

signal =
'⚡ BREAKOUT WATCH';

analysis =
'Momentum mulai terbentuk';

}

return {

symbol:c.symbol,
change:change,
volume:volume,
count:count,
ai:ai,
signal:signal,
analysis:analysis

};

})

.filter(c =>
c.ai >= 60
)

.sort((a,b) =>
b.ai - a.ai
)

.slice(0,10);

let html = '';

filtered.forEach(c => {

const volume =
(c.volume/1000000)
.toFixed(0);

html += `

<div class="card">

<div class="coin">

${c.symbol}

<span class="rank">
AI ${c.ai}/100
</span>

</div>

<div class="signal">
${c.signal}
</div>

<div class="stats">

📈 24H Change:
${c.change.toFixed(2)}%<br>

💰 Futures Volume:
$${volume}M<br>

⚡ Trade Activity:
${Math.floor(c.count)} trades

</div>

<div class="ai">

🧠 AI Analysis:
${c.analysis}

</div>

</div>

`;

});

document.getElementById('market')
.innerHTML = html;

}

loadData();

setInterval(loadData, 5000);

</script>

</body>
</html>
