<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner V5</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:42px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:16px;
    margin-bottom:14px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:26px;
    font-weight:bold;
}

.rank{
    float:right;
    background:#10b981;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
}

.signal{
    margin-top:10px;
    font-size:18px;
}

.zone{
    margin-top:10px;
    color:#93c5fd;
    font-size:14px;
}

.ai{
    margin-top:10px;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    color:#38bdf8;
    font-size:13px;
}

.conf{
    margin-top:8px;
    color:#facc15;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI Scanner V5</div>
<div class="sub">Structure + Liquidity + Trend Shift Engine</div>
<div class="live">🟢 LIVE FUTURES SCANNER</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
const data = await res.json();

let html = '';

const filtered = data
.filter(c => c.symbol.endsWith('USDT'))
.map(c => {

const price = parseFloat(c.lastPrice);
const high = parseFloat(c.highPrice);
const low = parseFloat(c.lowPrice);

const volume = parseFloat(c.quoteVolume);
const change = parseFloat(c.priceChangePercent);
const count = parseFloat(c.count);

/* =========================
   TREND STATE ENGINE
========================= */
let trend = "RANGE";

if(change > 3) trend = "BULLISH MOMENTUM";
if(change < -3) trend = "BEARISH MOMENTUM";

/* =========================
   SMART MONEY SCORE
========================= */
let score = 0;
let trap = 0;

/* volume confirmation */
if(volume > 200000000) score += 25;
if(volume > 400000000) score += 40;

/* healthy movement */
if(change > 1 && change < 5) score += 20;

/* activity */
if(count > 120000) score += 15;

/* efficiency */
if(volume / count > 500) score += 10;

/* =========================
   STRUCTURE SHIFT (IMPORTANT)
========================= */
let structureShift = false;

if(change > 5){
    structureShift = true;
    score += 20;
}

if(change < -5){
    structureShift = true;
    score -= 15;
}

/* =========================
   LIQUIDITY SWEEP (proxy)
========================= */
let liquiditySweep = false;

if(change < -2 && price > low * 1.02){
    liquiditySweep = true;
    score += 15;
}

/* =========================
   TRAP DETECTOR
========================= */
if(change > 10) trap += 40;
if(volume < 60000000 && change > 4) trap += 25;

/* =========================
   SUPPORT / RESISTANCE ZONE
========================= */
const resistance = high;
const support = low;

let zone = "MID";

if(price > high * 0.98){
    zone = "RESISTANCE";
}

if(price < low * 1.02){
    zone = "SUPPORT";
}

/* =========================
   BREAKOUT CONFIRMATION
========================= */
let breakout = false;

if(price > high * 0.995 && volume > 200000000){
    breakout = true;
    score += 25;
}

/* =========================
   SIGNAL ENGINE
========================= */
let signal = "👀 WATCH";
let analysis = "Market belum ada structure jelas";
let conf = "MEDIUM";

if(breakout && trend === "BULLISH MOMENTUM" && trap < 20){
    signal = "🚀 BREAKOUT BUY CONFIRMED";
    analysis = "Breakout + volume + trend align";
    conf = "VERY HIGH";
}

else if(score > 85 && liquiditySweep && zone === "SUPPORT"){
    signal = "🔥 SMART MONEY ACCUMULATION";
    analysis = "Sweep + support accumulation";
    conf = "HIGH";
}

else if(score > 75){
    signal = "⚡ EARLY MOVE WATCH";
    analysis = "Trend mulai terbentuk";
    conf = "MEDIUM";
}

if(zone === "RESISTANCE" && change < 0){
    signal = "⚠️ REJECTION RISK";
    analysis = "Tertahan di resistance";
    conf = "LOW";
}

if(trap > 50){
    signal = "💀 LIQUIDITY TRAP";
    analysis = "Fake move kemungkinan tinggi";
    conf = "LOW";
    score -= 20;
}

/* =========================
   OUTPUT
========================= */
return {
symbol:c.symbol,
price:price,
change:change,
volume:volume,
count:count,
score:score,
signal:signal,
analysis:analysis,
conf:conf,
trend:trend,
zone:zone,
breakout:breakout,
liquiditySweep:liquiditySweep,
support:support,
resistance:resistance
};

})
.filter(c => c.score >= 70)
.sort((a,b) => b.score - a.score)
.slice(0,10);

filtered.forEach(c => {

const vol = (c.volume/1000000).toFixed(0);

html += `
<div class="card">

<div class="coin">
${c.symbol}
<span class="rank">AI ${c.score}/100</span>
</div>

<div class="signal">
${c.signal}
</div>

<div class="zone">
📊 Trend: ${c.trend}<br>
📍 Zone: ${c.zone}<br>
📈 Breakout: ${c.breakout ? "YES" : "NO"} | Sweep: ${c.liquiditySweep ? "YES" : "NO"}<br>
📌 Support: ${c.support.toFixed(6)} | Resistance: ${c.resistance.toFixed(6)}
</div>

<div class="ai">
🧠 Analysis: ${c.analysis}

<div class="conf">
⭐ Confidence: ${c.conf}
</div>

</div>

</div>
`;
});

document.getElementById('market').innerHTML = html;

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
