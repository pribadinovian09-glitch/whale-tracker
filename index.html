<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner V9</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#040515;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:38px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:16px;
    border-radius:14px;
    margin-bottom:12px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:22px;
    font-weight:bold;
}

.rank{
    float:right;
    background:#10b981;
    padding:5px 9px;
    border-radius:999px;
    font-size:12px;
}

.signal{
    margin-top:10px;
    font-size:17px;
}

.zone{
    margin-top:8px;
    color:#93c5fd;
    font-size:13px;
}

.ai{
    margin-top:8px;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    color:#38bdf8;
    font-size:12px;
}

.conf{
    margin-top:6px;
    color:#facc15;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI Scanner V9</div>
<div class="sub">Trading System Engine (Entry + Risk + Probability)</div>
<div class="live">🟢 LIVE INSTITUTIONAL FLOW</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
const data = await res.json();

let html = '';

const filtered = data
.filter(c => c.symbol.endsWith('USDT'))
.map(c => {

const price = parseFloat(c.lastPrice);
const high = parseFloat(c.highPrice);
const low = parseFloat(c.lowPrice);

const volume = parseFloat(c.quoteVolume);
const change = parseFloat(c.priceChangePercent);
const count = parseFloat(c.count);

/* =========================
   MULTI TIMEFRAME BIAS (PROXY)
========================= */
let tf = "NEUTRAL";

if(change > 4) tf = "BULLISH";
if(change < -4) tf = "BEARISH";

/* =========================
   STRUCTURE QUALITY
========================= */
let structure = 0;

if(change > 1 && change < 5) structure += 25;
if(volume > 200000000) structure += 25;
if(volume > 400000000) structure += 15;
if(count > 120000) structure += 10;

/* =========================
   LIQUIDITY ZONES (CLUSTER)
========================= */
const range = high - low;

const demandLow = low;
const demandHigh = low + range * 0.22;

const supplyHigh = high;
const supplyLow = high - range * 0.22;

let zone = "MID";

if(price <= demandHigh) zone = "DEMAND ZONE";
if(price >= supplyLow) zone = "SUPPLY ZONE";

/* =========================
   LIQUIDITY SWEEP (REALISTIC)
========================= */
let sweep = false;

if(price < low * 1.02 && change < 0) sweep = true;
if(price > high * 0.98 && change > 0) sweep = true;

/* =========================
   BREAKOUT CONFIRMATION
========================= */
let breakout = false;

if(price > high * 0.995 && volume > 250000000){
    breakout = true;
    structure += 30;
}

/* =========================
   RISK ENGINE
========================= */
let risk = 0;

if(change > 8 || change < -8) risk += 30;
if(volume < 80000000 && change > 4) risk += 20;
if(tf === "BEARISH" && change > 4) risk += 25;
if(zone === "SUPPLY ZONE" && change > 0) risk += 15;

/* =========================
   PROBABILITY ENGINE (0–1000)
========================= */
let probability = 0;

probability += structure * 3;
if(breakout) probability += 150;
if(sweep) probability += 80;
if(tf === "BULLISH") probability += 100;
if(zone === "DEMAND ZONE") probability += 100;

probability -= risk * 2;

/* =========================
   ENTRY ZONE ENGINE
========================= */
let entry = "WAIT";

let buyLow = (price * 0.98).toFixed(6);
let buyHigh = (price * 1.01).toFixed(6);

let sellLow = (price * 0.99).toFixed(6);
let sellHigh = (price * 1.02).toFixed(6);

if(zone === "DEMAND ZONE" && tf === "BULLISH"){
    entry = `BUY ZONE: ${buyLow} - ${buyHigh}`;
}

if(zone === "SUPPLY ZONE" && tf === "BEARISH"){
    entry = `SELL ZONE: ${sellLow} - ${sellHigh}`;
}

/* =========================
   FINAL SIGNAL ENGINE
========================= */
let signal = "⚠️ NO TRADE";
let analysis = "No strong institutional setup";
let conf = "LOW";

if(probability > 850 && breakout && tf === "BULLISH"){
    signal = "🚀 INSTITUTIONAL BREAKOUT";
    analysis = "High probability breakout + trend alignment";
    conf = "VERY HIGH";
}

else if(probability > 800 && sweep && tf === "BULLISH"){
    signal = "🔥 SMART MONEY ACCUMULATION";
    analysis = "Liquidity sweep + demand zone entry";
    conf = "HIGH";
}

else if(probability > 700){
    signal = "⚡ EARLY SETUP WATCH";
    analysis = "Structure forming but not confirmed";
    conf = "MEDIUM";
}

if(risk > 60){
    signal = "💀 HIGH RISK / AVOID";
    analysis = "Market condition unsafe for entry";
    conf = "LOW";
}

/* =========================
   OUTPUT
========================= */
return {
symbol:c.symbol,
price:price,
change:change,
volume:volume,
count:count,
tf:tf,
zone:zone,
breakout:breakout,
sweep:sweep,
risk:risk,
probability:probability,
entry:entry,
signal:signal,
analysis:analysis,
conf:conf
};

})
.filter(c => c.probability >= 650)
.sort((a,b) => b.probability - a.probability)
.slice(0,8);

filtered.forEach(c => {

const vol = (c.volume/1000000).toFixed(0);

html += `
<div class="card">

<div class="coin">
${c.symbol}
<span class="rank">${c.probability}/1000</span>
</div>

<div class="signal">
${c.signal}
</div>

<div class="zone">
📊 TF: ${c.tf}<br>
📍 Zone: ${c.zone}<br>
🎯 Entry: ${c.entry}<br>
📈 Change: ${c.change.toFixed(2)}% | Volume: $${vol}M<br>
⚠️ Risk: ${c.risk}
</div>

<div class="ai">
🧠 ${c.analysis}

<div class="conf">
⭐ Confidence: ${c.conf}
</div>

</div>

</div>
`;
});

document.getElementById('market').innerHTML = html;

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
