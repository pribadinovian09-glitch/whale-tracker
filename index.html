<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MA200 Daily Touch Scanner</title>

<style>

body{
 background:#050816;
 color:white;
 font-family:Arial;
 padding:20px;
}

h1{
 text-align:center;
}

#status{
 text-align:center;
 color:#38bdf8;
 margin-bottom:20px;
}

.card{
 background:#111827;
 padding:15px;
 margin-bottom:10px;
 border-radius:12px;
 border-left:5px solid #22c55e;
}

.symbol{
 font-size:20px;
 font-weight:bold;
}

.touch{
 color:#22c55e;
 font-weight:bold;
}

.small{
 color:#cbd5e1;
 margin-top:10px;
}

</style>
</head>

<body>

<h1>🔥 MA200 Daily Touch Scanner</h1>

<div id="status">
Loading...
</div>

<div id="results"></div>

<script>

const BASE =
"https://fapi.binance.com";

function SMA(data,period){

 let sum = 0;

 for(
 let i=data.length-period;
 i<data.length;
 i++
 ){
  sum += data[i];
 }

 return sum / period;
}

async function getTop30(){

 const res =
 await fetch(
 BASE +
 "/fapi/v1/ticker/24hr"
 );

 const data =
 await res.json();

 return data
 .filter(
 x=>x.symbol.endsWith("USDT")
 )
 .sort(
 (a,b)=>
 Number(b.quoteVolume)
 -
 Number(a.quoteVolume)
 )
 .slice(0,30);

}

async function getKlines(symbol){

 const res =
 await fetch(
 `${BASE}/fapi/v1/klines?symbol=${symbol}&interval=1d&limit=200`
 );

 return await res.json();
}

async function scan(){

 const status =
 document.getElementById(
 "status"
 );

 const resultsDiv =
 document.getElementById(
 "results"
 );

 status.innerHTML =
 "Scanning...";

 resultsDiv.innerHTML =
 "";

 const pairs =
 await getTop30();

 const found = [];

 let count = 0;

 for(const pair of pairs){

  count++;

  status.innerHTML =
  `Scanning ${count}/30 ${pair.symbol}`;

  try{

   const klines =
   await getKlines(
   pair.symbol
   );

   if(
   !Array.isArray(klines)
   ||
   klines.length < 200
   ){
    continue;
   }

   const closes =
   klines.map(
   x=>Number(x[4])
   );

   const ma200 =
   SMA(
   closes,
   200
   );

   const last =
   klines[
   klines.length-1
   ];

   const high =
   Number(last[2]);

   const low =
   Number(last[3]);

   const close =
   Number(last[4]);

   const touched =
   low <= ma200 &&
   high >= ma200;

   if(touched){

    found.push({

     symbol:
     pair.symbol,

     close,

     ma200,

     low,

     high

    });

   }

  }catch(err){

   console.log(err);

  }
 }

 let html = "";

 found.forEach(c=>{

 html += `
 <div class="card">

 <div class="symbol">
 ${c.symbol}
 </div>

 <div class="touch">
 🔥 MENYENTUH MA200 DAILY
 </div>

 <div class="small">

 Close:
 ${c.close}

 <br>

 MA200:
 ${c.ma200.toFixed(4)}

 <br>

 Low:
 ${c.low}

 <br>

 High:
 ${c.high}

 </div>

 </div>
 `;
 });

 if(found.length===0){

 html =
 `
 <div class="card">

 Tidak ada coin Top 30
 yang sedang menyentuh
 MA200 Daily.

 </div>
 `;
 }

 resultsDiv.innerHTML =
 html;

 status.innerHTML =
 `Update:
 ${new Date().toLocaleTimeString()}
 | ${found.length}
 Coin`;

}

scan();

setInterval(
scan,
300000
);

</script>

</body>
</html>
