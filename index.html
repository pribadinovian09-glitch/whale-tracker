<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner V3 PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#081120;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:48px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
    font-size:18px;
}

.card{
    background:#111827;
    padding:24px;
    border-radius:20px;
    margin-bottom:22px;
    border-left:7px solid #10b981;
}

.coin{
    font-size:34px;
    font-weight:bold;
}

.signal{
    margin-top:12px;
    font-size:21px;
    color:#22c55e;
}

.stats{
    margin-top:18px;
    line-height:2;
    color:#cbd5e1;
    font-size:18px;
}

.rank{
    float:right;
    background:#10b981;
    padding:8px 14px;
    border-radius:999px;
    font-size:14px;
}

.ai{
    margin-top:14px;
    background:#0f172a;
    padding:14px;
    border-radius:14px;
    color:#38bdf8;
    font-size:16px;
}

.conf{
    margin-top:10px;
    color:#facc15;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI Scanner V3 PRO</div>
<div class="sub">Realtime Whale Flow + Futures Intelligence</div>
<div class="live">🟢 LIVE BINANCE FUTURES AI ENGINE</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const tickerRes = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
const tickers = await tickerRes.json();

let html = '';

const filtered = tickers
.filter(c => c.symbol.endsWith('USDT'))
.map(c => {

const volume = parseFloat(c.quoteVolume);
const change = parseFloat(c.priceChangePercent);
const count = parseFloat(c.count);

let ai = 0;
let structure = 0;
let trap = 0;

/* =========================
   VOLUME FILTER
========================= */
if(volume > 150000000) ai += 25;
if(volume > 300000000) ai += 40;

/* =========================
   HEALTHY MOVE FILTER
========================= */
if(change > 1 && change < 5) ai += 25;

/* =========================
   ACTIVITY FILTER
========================= */
if(count > 120000) ai += 15;

/* =========================
   EFFICIENCY FILTER
========================= */
if(volume / count > 500) ai += 10;

/* =========================
   STRUCTURE LOGIC
========================= */
if(change > 2 && change < 6) structure += 20;
if(change > -3 && change < 3) structure += 15;
if(change > 10) structure -= 30;

/* =========================
   TRAP DETECTOR
========================= */
if(change > 8) trap += 40;
if(volume < 50000000 && change > 3) trap += 25;

/* =========================
   APPLY FILTERS
========================= */
ai += structure;
ai -= trap;

/* =========================
   SIGNAL LOGIC
========================= */
let signal = '👀 WATCH';
let analysis = 'Market belum jelas arah';
let conf = 'MEDIUM';

if(ai > 90 && trap < 20){
    signal = '🚀 SMART MONEY BUY ZONE';
    analysis = 'Accumulation + breakout structure valid';
    conf = 'VERY HIGH';
}
else if(ai > 80 && trap < 30){
    signal = '🔥 BUY WATCH ZONE';
    analysis = 'Early accumulation detected';
    conf = 'HIGH';
}
else if(ai > 70){
    signal = '⚡ WAIT CONFIRMATION';
    analysis = 'Belum cukup kuat untuk entry';
    conf = 'MEDIUM';
}

if(trap > 50){
    signal = '⚠️ REBOUND / TRAP RISK';
    analysis = 'Fake pump / liquidity grab kemungkinan tinggi';
    conf = 'LOW';
    ai -= 20;
}

return {
symbol:c.symbol,
change:change,
volume:volume,
count:count,
ai:ai,
signal:signal,
analysis:analysis,
conf:conf
};

})
.filter(c => c.ai >= 70)
.sort((a,b) => b.ai - a.ai)
.slice(0,10);

filtered.forEach(c => {

const volume = (c.volume/1000000).toFixed(0);

html += `
<div class="card">

<div class="coin">
${c.symbol}
<span class="rank">AI ${c.ai}/100</span>
</div>

<div class="signal">
${c.signal}
</div>

<div class="stats">
📈 24H Change: ${c.change.toFixed(2)}%<br>
💰 Futures Volume: $${volume}M<br>
⚡ Trade Activity: ${Math.floor(c.count)} trades
</div>

<div class="ai">
🧠 AI Analysis: ${c.analysis}

<div class="conf">
⭐ Confidence: ${c.conf}
</div>

</div>

</div>
`;
});

document.getElementById('market').innerHTML = html;

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
