<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA200 Scanner Binance</title>

<style>
body{
    background:#050816;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#status{
    text-align:center;
    color:#38bdf8;
    margin-bottom:20px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

.symbol{
    font-size:20px;
    font-weight:bold;
}

.distance{
    color:#22c55e;
}

.price{
    color:#cbd5e1;
}
</style>
</head>
<body>

<h1>📈 Binance MA200 Scanner</h1>

<div id="status">
Loading...
</div>

<div id="results"></div>

<script>

const BASE = "https://fapi.binance.com";

function SMA(data, period){

    const slice = data.slice(-period);

    const sum = slice.reduce((a,b)=>a+b,0);

    return sum / period;
}

async function getTop100(){

    const res = await fetch(
        BASE + "/fapi/v1/ticker/24hr"
    );

    const data = await res.json();

    return data
        .filter(x=>x.symbol.endsWith("USDT"))
        .sort(
            (a,b)=>
            Number(b.quoteVolume)
            - Number(a.quoteVolume)
        )
        .slice(0,100);
}

async function getKlines(symbol){

    const res = await fetch(
        `${BASE}/fapi/v1/klines?symbol=${symbol}&interval=4h&limit=200`
    );

    return await res.json();
}

async function scan(){

    document.getElementById("status")
    .innerHTML =
    "Scanning Top 100...";

    const pairs =
    await getTop100();

    const found = [];

    for(const pair of pairs){

        try{

            const klines =
            await getKlines(pair.symbol);

            const closes =
            klines.map(
                x=>Number(x[4])
            );

            const ma200 =
            SMA(closes,200);

            const price =
            closes[closes.length-1];

            const distance =
            Math.abs(
                price - ma200
            ) / ma200 * 100;

            if(distance <= 1){

                found.push({

                    symbol:
                    pair.symbol,

                    price:
                    price,

                    ma200:
                    ma200,

                    distance:
                    distance
                });
            }

        }catch(err){

            console.log(
                pair.symbol,
                err
            );
        }
    }

    found.sort(
        (a,b)=>
        a.distance - b.distance
    );

    let html = "";

    found.forEach(c=>{

        html += `
        <div class="card">

            <div class="symbol">
            ${c.symbol}
            </div>

            <div class="distance">
            Distance:
            ${c.distance.toFixed(2)}%
            </div>

            <div class="price">
            Price:
            ${c.price.toFixed(4)}
            </div>

            <div class="price">
            MA200:
            ${c.ma200.toFixed(4)}
            </div>

        </div>
        `;
    });

    if(found.length===0){

        html =
        "<div class='card'>Tidak ada coin dalam jarak 1% dari MA200</div>";
    }

    document.getElementById(
        "results"
    ).innerHTML = html;

    document.getElementById(
        "status"
    ).innerHTML =
    `Last Update: ${new Date().toLocaleTimeString()}`;
}

scan();

setInterval(
    scan,
    300000
);
</script>

</body>
</html>
