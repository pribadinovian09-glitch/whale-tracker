<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner V10</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#040514;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:38px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:16px;
    border-radius:14px;
    margin-bottom:12px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:22px;
    font-weight:bold;
}

.rank{
    float:right;
    background:#10b981;
    padding:5px 9px;
    border-radius:999px;
    font-size:12px;
}

.signal{
    margin-top:10px;
    font-size:17px;
}

.zone{
    margin-top:8px;
    color:#93c5fd;
    font-size:13px;
}

.ai{
    margin-top:8px;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    color:#38bdf8;
    font-size:12px;
}

.conf{
    margin-top:6px;
    color:#facc15;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI Scanner V10</div>
<div class="sub">Multi-Timeframe + Anti Fake Breakout Engine</div>
<div class="live">🟢 LIVE INSTITUTIONAL FLOW</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
const data = await res.json();

let html = '';

const filtered = data
.filter(c => c.symbol.endsWith('USDT'))
.map(c => {

const price = parseFloat(c.lastPrice);
const high = parseFloat(c.highPrice);
const low = parseFloat(c.lowPrice);

const volume = parseFloat(c.quoteVolume);
const change = parseFloat(c.priceChangePercent);
const count = parseFloat(c.count);

/* =========================
   MULTI TIMEFRAME ENGINE
========================= */
let tf_big = "NEUTRAL";   // 24H bias
let tf_small = "NEUTRAL"; // intraday momentum

if(change > 4) tf_big = "BULLISH";
if(change < -4) tf_big = "BEARISH";

if(change > 1) tf_small = "BULLISH";
if(change < -1) tf_small = "BEARISH";

/* =========================
   ALIGNMENT CHECK
========================= */
let aligned = (tf_big === tf_small);

/* =========================
   CORE STRUCTURE SCORE
========================= */
let score = 0;

if(volume > 200000000) score += 25;
if(volume > 400000000) score += 15;
if(change > 1 && change < 5) score += 20;
if(count > 120000) score += 10;

/* =========================
   LIQUIDITY SWEEP
========================= */
let sweep = false;

if(price < low * 1.02 && change < 0) sweep = true;
if(price > high * 0.98 && change > 0) sweep = true;

if(sweep) score += 15;

/* =========================
   BREAKOUT LOGIC
========================= */
let breakout = price > high * 0.995 && volume > 250000000;

if(breakout) score += 25;

/* =========================
   FAKE BREAKOUT FILTER
========================= */
let fakeBreakout = false;

if(price > high * 0.995 && volume < 120000000){
    fakeBreakout = true;
    score -= 30;
}

/* =========================
   RISK ENGINE
========================= */
let risk = 0;

if(change > 8 || change < -8) risk += 30;
if(tf_big !== tf_small) risk += 25;
if(volume < 80000000) risk += 20;
if(fakeBreakout) risk += 40;

/* =========================
   PROBABILITY ENGINE
========================= */
let probability = 0;

probability += score * 3;
if(aligned) probability += 120;
if(breakout) probability += 120;
if(sweep) probability += 80;
if(tf_big === "BULLISH") probability += 80;

probability -= risk * 2;

/* =========================
   ENTRY ZONE
========================= */
let entry = "WAIT";

let buyLow = (price * 0.98).toFixed(6);
let buyHigh = (price * 1.01).toFixed(6);

if(aligned && tf_big === "BULLISH" && sweep){
    entry = `BUY ZONE: ${buyLow} - ${buyHigh}`;
}

/* =========================
   SIGNAL ENGINE
========================= */
let signal = "⚠️ NO TRADE";
let analysis = "No alignment / low quality setup";
let conf = "LOW";

if(probability > 800 && aligned && breakout && tf_big === "BULLISH"){
    signal = "🚀 CONFIRMED BREAKOUT";
    analysis = "Multi-timeframe alignment + breakout confirmed";
    conf = "VERY HIGH";
}

else if(probability > 750 && sweep && aligned){
    signal = "🔥 SMART MONEY ACCUMULATION";
    analysis = "Liquidity sweep + aligned trend";
    conf = "HIGH";
}

else if(probability > 650){
    signal = "⚡ EARLY STRUCTURE";
    analysis = "Setup forming but not confirmed";
    conf = "MEDIUM";
}

if(fakeBreakout){
    signal = "💀 FAKE BREAKOUT RISK";
    analysis = "Low volume breakout detected";
    conf = "LOW";
}

/* =========================
   OUTPUT
========================= */
return {
symbol:c.symbol,
price:price,
change:change,
volume:volume,
tf_big:tf_big,
tf_small:tf_small,
aligned:aligned,
breakout:breakout,
fakeBreakout:fakeBreakout,
sweep:sweep,
risk:risk,
probability:probability,
entry:entry,
signal:signal,
analysis:analysis,
conf:conf
};

})
.filter(c => c.probability >= 650)
.sort((a,b) => b.probability - a.probability)
.slice(0,10);

/* fallback */
if(filtered.length === 0){
    filtered.push({
        symbol:"NO SETUP",
        price:0,
        change:0,
        volume:0,
        tf_big:"N/A",
        tf_small:"N/A",
        aligned:false,
        breakout:false,
        fakeBreakout:false,
        sweep:false,
        risk:0,
        probability:0,
        entry:"WAIT",
        signal:"⚠️ NO TRADE",
        analysis:"No valid multi-timeframe setup",
        conf:"LOW"
    });
}

filtered.forEach(c => {

const vol = (c.volume/1000000).toFixed(0);

html += `
<div class="card">

<div class="coin">
${c.symbol}
<span class="rank">${c.probability}/1000</span>
</div>

<div class="signal">
${c.signal}
</div>

<div class="zone">
📊 TF BIG: ${c.tf_big} | TF SMALL: ${c.tf_small}<br>
🔗 Aligned: ${c.aligned ? "YES" : "NO"}<br>
📈 Breakout: ${c.breakout ? "YES" : "NO"} | Fake: ${c.fakeBreakout ? "YES" : "NO"}<br>
🎯 Entry: ${c.entry}<br>
💰 Volume: $${vol}M | Change: ${c.change.toFixed(2)}%
</div>

<div class="ai">
🧠 ${c.analysis}

<div class="conf">
⭐ Confidence: ${c.conf}
</div>

</div>

</div>
`;
});

document.getElementById('market').innerHTML = html;

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
