<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI Scanner V6</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050712;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:40px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
}

.card{
    background:#111827;
    padding:18px;
    border-radius:14px;
    margin-bottom:12px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:24px;
    font-weight:bold;
}

.rank{
    float:right;
    background:#10b981;
    padding:5px 9px;
    border-radius:999px;
    font-size:12px;
}

.signal{
    margin-top:10px;
    font-size:17px;
}

.zone{
    margin-top:8px;
    color:#93c5fd;
    font-size:13px;
}

.ai{
    margin-top:10px;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    color:#38bdf8;
    font-size:13px;
}

.conf{
    margin-top:6px;
    color:#facc15;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI Scanner V6</div>
<div class="sub">Hedge Fund Style Liquidity + Trend Regime Engine</div>
<div class="live">🟢 LIVE FUTURES FLOW</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
const data = await res.json();

let html = '';

const filtered = data
.filter(c => c.symbol.endsWith('USDT'))
.map(c => {

const price = parseFloat(c.lastPrice);
const high = parseFloat(c.highPrice);
const low = parseFloat(c.lowPrice);

const volume = parseFloat(c.quoteVolume);
const change = parseFloat(c.priceChangePercent);
const count = parseFloat(c.count);

/* =========================
   REGIME DETECTION
========================= */
let regime = "RANGE";

if(change > 4) regime = "TREND UP";
if(change < -4) regime = "TREND DOWN";

/* =========================
   SMART MONEY SCORE CORE
========================= */
let score = 0;
let trap = 0;

/* volume strength */
if(volume > 200000000) score += 20;
if(volume > 400000000) score += 35;

/* movement quality */
if(change > 1 && change < 5) score += 20;

/* activity */
if(count > 120000) score += 15;

/* efficiency */
if(volume / count > 500) score += 10;

/* =========================
   LIQUIDITY ZONE (BROAD)
========================= */
const range = high - low;
const upperZone = high - (range * 0.15);
const lowerZone = low + (range * 0.15);

let zone = "MID";

if(price >= upperZone) zone = "SUPPLY ZONE";
if(price <= lowerZone) zone = "DEMAND ZONE";

/* =========================
   LIQUIDITY SWEEP LOGIC
========================= */
let sweep = false;

if(price < low * 1.02 && change < 0){
    sweep = true;
    score += 15;
}

if(price > high * 0.98 && change > 0){
    sweep = true;
    score += 10;
}

/* =========================
   BREAKOUT CONFIRMATION
========================= */
let breakout = false;

if(price > high * 0.995 && volume > 250000000){
    breakout = true;
    score += 25;
}

/* =========================
   TRAP FILTER (IMPROVED)
========================= */
if(change > 10) trap += 40;
if(volume < 60000000 && change > 4) trap += 25;
if(change > 7 && volume < 120000000) trap += 20;

/* =========================
   STRUCTURE MOMENTUM
========================= */
if(change > 3) score += 15;
if(change < -3) score -= 10;

/* =========================
   FINAL SIGNAL ENGINE
========================= */
let signal = "👀 WATCH";
let analysis = "Market belum ada edge jelas";
let conf = "MEDIUM";

if(breakout && regime === "TREND UP" && trap < 25){
    signal = "🚀 INSTITUTIONAL BREAKOUT";
    analysis = "Breakout + trend alignment + volume confirmed";
    conf = "VERY HIGH";
}

else if(score > 85 && sweep && zone === "DEMAND ZONE"){
    signal = "🔥 SMART MONEY ACCUMULATION";
    analysis = "Liquidity sweep + demand zone entry area";
    conf = "HIGH";
}

else if(score > 75){
    signal = "⚡ EARLY STRUCTURE BUILD";
    analysis = "Trend mulai terbentuk tapi belum breakout";
    conf = "MEDIUM";
}

if(zone === "SUPPLY ZONE" && change < 0){
    signal = "⚠️ DISTRIBUTION RISK";
    analysis = "Harga di area supply + tekanan jual";
    conf = "LOW";
}

if(trap > 50){
    signal = "💀 LIQUIDITY TRAP";
    analysis = "Fake move / stop hunt kemungkinan tinggi";
    conf = "LOW";
    score -= 20;
}

/* =========================
   OUTPUT
========================= */
return {
symbol:c.symbol,
price:price,
change:change,
volume:volume,
count:count,
score:score,
signal:signal,
analysis:analysis,
conf:conf,
regime:regime,
zone:zone,
breakout:breakout,
sweep:sweep
};

})
.filter(c => c.score >= 70)
.sort((a,b) => b.score - a.score)
.slice(0,10);

filtered.forEach(c => {

const vol = (c.volume/1000000).toFixed(0);

html += `
<div class="card">

<div class="coin">
${c.symbol}
<span class="rank">AI ${c.score}/100</span>
</div>

<div class="signal">
${c.signal}
</div>

<div class="zone">
📊 Regime: ${c.regime}<br>
📍 Zone: ${c.zone}<br>
📈 Breakout: ${c.breakout ? "YES" : "NO"} | Sweep: ${c.sweep ? "YES" : "NO"}
</div>

<div class="ai">
🧠 ${c.analysis}

<div class="conf">
⭐ Confidence: ${c.conf}
</div>

</div>

</div>
`;
});

document.getElementById('market').innerHTML = html;

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
