<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Money AI V12 Crypto</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#040510;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:34px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

.card{
    background:#111827;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    border-left:5px solid #10b981;
}

.symbol{
    font-size:20px;
    font-weight:bold;
}

.badge{
    float:right;
    background:#3b82f6;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
}

.signal{
    margin-top:8px;
    font-size:16px;
}

.small{
    margin-top:6px;
    color:#93c5fd;
    font-size:13px;
}

.zone{
    color:#38bdf8;
    font-size:12px;
    margin-top:6px;
}

.risk{
    color:#facc15;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🧠 Smart Money AI V12</div>
<div class="sub">Decision Engine + Risk/Reward System</div>

<div id="market"></div>

</div>

<script>

async function run(){

const res = await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr");
const data = await res.json();

let html = "";

const result = data
.filter(c => c.symbol.endsWith("USDT"))
.slice(0,15)
.map(c => {

let price = parseFloat(c.lastPrice);
let change = parseFloat(c.priceChangePercent);
let volume = parseFloat(c.quoteVolume);
let high = parseFloat(c.highPrice);
let low = parseFloat(c.lowPrice);

/* =========================
   REGIME DETECTION
========================= */
let regime = "CHOP";

if(change > 4) regime = "TREND_UP";
if(change < -4) regime = "TREND_DOWN";

/* =========================
   SCORE ENGINE
========================= */
let score = 0;

if(volume > 200000000) score += 30;
if(change > 1 && change < 5) score += 25;

/* =========================
   LIQUIDITY SWEEP
========================= */
let sweep = false;

if(price < low * 1.02) sweep = true;
if(price > high * 0.98) sweep = true;

if(sweep) score += 20;

/* =========================
   BREAKOUT
========================= */
let breakout = price > high * 0.995 && volume > 200000000;

if(breakout) score += 30;

/* =========================
   RISK ENGINE
========================= */
let risk = 0;

if(change > 8 || change < -8) risk += 30;
if(volume < 80000000) risk += 20;
if(regime === "CHOP") risk += 20;

/* =========================
   RISK/REWARD SIMULATION
========================= */
let rr = 1 + (score / 100);

let sl = (price * 0.97).toFixed(4);
let tp1 = (price * 1.03).toFixed(4);
let tp2 = (price * 1.07).toFixed(4);

/* =========================
   FINAL SCORE
========================= */
let probability = score * 3 - risk * 2;

/* =========================
   SIGNAL ENGINE
========================= */
let signal = "⚠️ NO TRADE";

if(probability > 850 && breakout){
    signal = "🚀 STRONG BUY";
}
else if(probability > 700){
    signal = "⚡ BUY SETUP";
}
else if(probability < 400){
    signal = "⚠️ AVOID";
}

return {
symbol:c.symbol,
price:price,
change:change,
volume:volume,
regime:regime,
score:score,
risk:risk,
rr:rr,
sl:sl,
tp1:tp1,
tp2:tp2,
signal:signal,
probability:probability,
breakout:breakout,
sweep:sweep
};

})
.sort((a,b)=>b.probability-a.probability);

result.forEach(c => {

html += `
<div class="card">

<div class="symbol">
${c.symbol}
<span class="badge">${c.probability.toFixed(0)}</span>
</div>

<div class="signal">
${c.signal}
</div>

<div class="small">
📊 Price: ${c.price}<br>
📈 Change: ${c.change}%<br>
💰 Volume: ${c.volume}<br>
🧠 Regime: ${c.regime}
</div>

<div class="zone">
🎯 SL: ${c.sl} | TP1: ${c.tp1} | TP2: ${c.tp2}<br>
⚖️ R:R ~ ${c.rr.toFixed(2)}
</div>

<div class="risk">
⚠️ Risk Score: ${c.risk}
</div>

</div>
`;
});

document.getElementById("market").innerHTML = html;

}

run();
setInterval(run, 5000);

</script>

</body>
</html>
