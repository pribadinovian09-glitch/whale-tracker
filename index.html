<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Pump Detector</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#081120;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:42px;
    margin-top:20px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.live{
    text-align:center;
    color:#22c55e;
    margin-bottom:25px;
    font-size:18px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    border-left:6px solid #10b981;
}

.coin{
    font-size:30px;
    font-weight:bold;
}

.signal{
    margin-top:10px;
    font-size:20px;
    color:#22c55e;
}

.stats{
    margin-top:15px;
    line-height:1.9;
    color:#cbd5e1;
    font-size:18px;
}

.rank{
    float:right;
    background:#10b981;
    padding:8px 14px;
    border-radius:999px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
🚀 Early Pump Detector
</div>

<div class="sub">
Detect coin sebelum breakout besar
</div>

<div class="live">
🟢 LIVE BINANCE FUTURES
</div>

<div id="market"></div>

</div>

<script>

async function loadData(){

const response =
await fetch(
'https://fapi.binance.com/fapi/v1/ticker/24hr'
);

const data =
await response.json();

const filtered =
data
.filter(c =>
c.symbol.endsWith('USDT')
)
.map(c => {

const volume =
parseFloat(c.quoteVolume);

const change =
parseFloat(c.priceChangePercent);

const count =
parseFloat(c.count);

let score = 0;

if(volume > 50000000)
score += 40;

if(change > 1 && change < 8)
score += 35;

if(count > 100000)
score += 25;

return {

symbol:c.symbol,
change:change,
volume:volume,
count:count,
score:score

};

})
.filter(c =>
c.score >= 60
)
.sort((a,b) =>
b.score - a.score
)
.slice(0,10);

let html = '';

filtered.forEach(c => {

const volume =
(c.volume/1000000)
.toFixed(0);

let signal =
'👀 EARLY FLOW';

if(c.score > 90)
signal =
'🚀 STRONG EARLY PUMP';

else if(c.score > 75)
signal =
'🔥 SMART MONEY ENTRY';

html += `

<div class="card">

<div class="coin">

${c.symbol}

<span class="rank">
${c.score}/100
</span>

</div>

<div class="signal">
${signal}
</div>

<div class="stats">

📈 Price Change:
${c.change.toFixed(2)}%<br>

💰 Futures Volume:
$${volume}M<br>

⚡ Activity:
${Math.floor(c.count)} trades

</div>

</div>

`;

});

document.getElementById('market')
.innerHTML = html;

}

loadData();

setInterval(loadData, 5000);

</script>

</body>
</html>
